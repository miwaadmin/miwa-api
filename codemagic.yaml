# Codemagic build configuration for Miwa Care
#
# iOS-only. Android already builds through a separate pipeline (does not need
# Codemagic). Keep this file focused on iOS so the free-tier Mac minutes
# (500/mo) aren't wasted on duplicate Android builds.
#
# Signing uses the "Codemagic CI" App Store Connect API key integration
# (Teams → Integrations → Developer Portal). The build explicitly calls
# `app-store-connect fetch-signing-files --create` which creates the
# distribution certificate and App Store provisioning profile if they
# don't already exist for bundle ID care.miwa.app. Then it imports them
# into the keychain, applies them to the Xcode project, builds a signed
# IPA, and uploads to TestFlight on success.
#
# Triggering: builds run on demand from the Codemagic UI. Auto-trigger on push
# is intentionally off — iOS Mac-minute builds are expensive against the free
# tier, and we don't want every backend commit eating budget.

workflows:
  ios-capacitor:
    name: Miwa iOS (Capacitor)
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: Codemagic CI

    environment:
      node: 22
      npm: 10
      xcode: latest
      vars:
        BUNDLE_ID: "care.miwa.app"
        XCODE_PROJECT: "App.xcodeproj"
        XCODE_SCHEME: "App"

    scripts:
      - name: Install client dependencies
        script: |
          cd client
          npm ci

      - name: Build web assets (Vite)
        script: |
          cd client
          npm run build

      - name: Sync Capacitor iOS project
        script: |
          cd client
          npx cap sync ios

      - name: Set TestFlight-unique build number
        script: |
          cd client/ios/App
          agvtool new-version -all "$BUILD_NUMBER"

      - name: Initialize keychain
        script: |
          keychain initialize

      - name: Generate fresh private key for distribution certificate
        script: |
          # The App Store Connect API needs a private key passed in for both
          # cert creation and profile creation. We generate a fresh 2048-bit
          # RSA key on the build VM and reuse it across the signing steps.
          # This key never leaves the VM and is regenerated every build.
          openssl genrsa -out /tmp/distribution_key.pem 2048

      - name: Fetch or create signing files
        script: |
          # --create will create a fresh distribution cert using the provided
          # private key if no matching cert exists, then create the
          # App Store provisioning profile for $BUNDLE_ID. If this fails
          # with "Maximum number of certificates exceeded", revoke the old
          # Xcode-Cloud-era cert in Apple Developer Portal → Certificates
          # and retry.
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @file:/tmp/distribution_key.pem

      - name: Add certificates to keychain
        script: |
          keychain add-certificates --certificate-key @file:/tmp/distribution_key.pem

      - name: Apply signing profiles to Xcode project
        script: |
          cd client/ios/App
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          cd client/ios/App
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
