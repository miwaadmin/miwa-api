# Codemagic build configuration for Miwa Care
#
# iOS-only. Android already builds through a separate pipeline (does not need
# Codemagic). Keep this file focused on iOS so the free-tier Mac minutes
# (500/mo) aren't wasted on duplicate Android builds.
#
# The workflow starts unsigned so the first build doesn't need any credentials
# uploaded to Codemagic. Once this is green, add signing and TestFlight
# distribution by:
#   • Uploading an Apple App Store Connect API key
#     (Teams → Integrations → Apple Developer Portal)
#   • Adding an `ios_signing` block + `app_store_connect` publishing block
#     to this workflow.
#
# Triggering: builds run on demand from the Codemagic UI. Auto-trigger on push
# is intentionally off — iOS Mac-minute builds are expensive against the free
# tier, and we don't want every backend commit eating budget.

workflows:
  ios-capacitor:
    name: Miwa iOS (Capacitor)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: 22
      npm: 10
      xcode: latest

    scripts:
      - name: Install client dependencies
        script: |
          cd client
          npm ci

      - name: Build web assets (Vite)
        script: |
          cd client
          npm run build

      - name: Sync Capacitor iOS project
        script: |
          cd client
          npx cap sync ios

      - name: Build unsigned archive
        script: |
          cd client/ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

    artifacts:
      - client/ios/App/build/App.xcarchive
