# Codemagic build configuration for Miwa Care
#
# iOS-only. Android already builds through a separate pipeline (does not need
# Codemagic). Keep this file focused on iOS so the free-tier Mac minutes
# (500/mo) aren't wasted on duplicate Android builds.
#
# Signing is wired to the "Codemagic CI" App Store Connect API key integration
# (Teams → Integrations → Developer Portal). The key auto-fetches/creates
# distribution certificates and provisioning profiles for bundle ID
# care.miwa.app, builds a signed IPA, and uploads it to TestFlight on success.
#
# Triggering: builds run on demand from the Codemagic UI. Auto-trigger on push
# is intentionally off — iOS Mac-minute builds are expensive against the free
# tier, and we don't want every backend commit eating budget.

workflows:
  ios-capacitor:
    name: Miwa iOS (Capacitor)
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: Codemagic CI

    environment:
      node: 22
      npm: 10
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: care.miwa.app

    scripts:
      - name: Install client dependencies
        script: |
          cd client
          npm ci

      - name: Build web assets (Vite)
        script: |
          cd client
          npm run build

      - name: Sync Capacitor iOS project
        script: |
          cd client
          npx cap sync ios

      - name: Set TestFlight-unique build number
        script: |
          cd client/ios/App
          agvtool new-version -all "$BUILD_NUMBER"

      - name: Fetch provisioning profiles + certs
        script: |
          cd client/ios/App
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          cd client/ios/App
          xcode-project build-ipa \
            --project "App.xcodeproj" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
