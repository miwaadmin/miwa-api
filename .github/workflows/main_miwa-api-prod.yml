# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - miwa-api-prod

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: miwa-api-prod-main
  # Queue runs instead of cancelling — each push gets its own independent
  # deploy so a failing newer push can never block an older successful one
  # from reaching production. Azure App Service serializes deploys to the
  # same slot anyway, so this just makes the queue explicit and visible.
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: npm install, build, and test
        # VITE_* env vars are baked into the client bundle at build time, so
        # they're set here on the build step (not in Azure App Service, which
        # only affects runtime). The community URL lives in a GitHub Actions
        # secret so it can be rotated without a code change — add or update
        # via Repo → Settings → Secrets and variables → Actions.
        env:
          VITE_COMMUNITY_URL: ${{ secrets.VITE_COMMUNITY_URL }}
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present
          npm prune --omit=dev
          rm -rf client/node_modules

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_12A57D2CABFA4BC3A92EC40BDDCF8E28 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A466E37A18AC4463BA56937C3C2C34AA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C9AAE82CD9324A1798CD5A6D63E4EDA2 }}

      - name: Sync runtime secrets to Azure App Service
        # Some env vars (DISCORD_BOT_TOKEN) are runtime-only — they need to
        # live in Azure App Service application settings, NOT baked into the
        # build artifact. This step pushes the GitHub secret value into
        # App Service config on each deploy so the running Node process
        # can read it from process.env. The az login above is reused.
        # Resource group is discovered from the webapp name to avoid
        # hard-coding it. If a secret is unset in GitHub, the corresponding
        # App Service setting is left alone (we never clear it from here).
        run: |
          set -e
          RG=$(az webapp list --query "[?name=='miwa-api-prod'].resourceGroup | [0]" -o tsv)
          if [ -z "$RG" ]; then
            echo "::warning::Could not resolve resource group for miwa-api-prod — skipping app settings sync"
            exit 0
          fi
          UPDATES=()
          if [ -n "$DISCORD_BOT_TOKEN_VALUE" ]; then
            UPDATES+=("DISCORD_BOT_TOKEN=$DISCORD_BOT_TOKEN_VALUE")
          fi
          if [ -n "$OPENAI_PHI_API_KEY_VALUE" ]; then
            UPDATES+=("OPENAI_PHI_API_KEY=$OPENAI_PHI_API_KEY_VALUE")
          fi
          UPDATES+=("AI_TEXT_PROVIDER=auto")
          UPDATES+=("OPENAI_PHI_ZDR_ENABLED=true")
          UPDATES+=("OPENAI_PHI_MODEL=gpt-5.5")
          UPDATES+=("OPENAI_PHI_FAST_MODEL=gpt-5.4-mini")
          UPDATES+=("OPENAI_PHI_TOOL_MODEL=gpt-5.4-mini")
          UPDATES+=("OPENAI_PHI_STRUCTURED_MODEL=gpt-5.4-mini")
          UPDATES+=("OPENAI_REALTIME_PHI_ENABLED=true")
          UPDATES+=("OPENAI_REALTIME_MODEL=gpt-realtime-2")
          UPDATES+=("OPENAI_REALTIME_TRANSCRIPTION_MODEL=gpt-realtime-whisper")
          UPDATES+=("OPENAI_REALTIME_TRANSLATION_MODEL=gpt-realtime-2")
          UPDATES+=("OPENAI_REALTIME_VOICE=marin")
          if [ ${#UPDATES[@]} -eq 0 ]; then
            echo "No runtime secrets to sync — skipping."
            exit 0
          fi
          az webapp config appsettings set \
            --name miwa-api-prod \
            --resource-group "$RG" \
            --settings "${UPDATES[@]}" \
            --output none
          echo "Synced ${#UPDATES[@]} runtime secret(s) to Azure App Service."
        env:
          DISCORD_BOT_TOKEN_VALUE: ${{ secrets.DISCORD_BOT_TOKEN }}
          OPENAI_PHI_API_KEY_VALUE: ${{ secrets.OPENAI_PHI_API_KEY }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'miwa-api-prod'
          slot-name: 'Production'
          package: .
          
