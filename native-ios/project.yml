name: Miwa
options:
  bundleIdPrefix: care.miwa
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: ""
packages: {}
targets:
  Miwa:
    type: application
    platform: iOS
    sources:
      - path: Miwa/App
      - path: Miwa/Core
      - path: Miwa/Features
    resources:
      - path: Miwa/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: care.miwa.app
        INFOPLIST_FILE: Miwa/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    info:
      path: Miwa/App/Info.plist
      properties:
        CFBundleDisplayName: Miwa
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
schemes:
  Miwa:
    build:
      targets:
        Miwa: all
    run:
      config: Debug
    archive:
      config: Release
